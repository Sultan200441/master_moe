<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Педагогика | Емтихан платформасы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;--bg2:#111520;--bg3:#181d2e;--bg4:#1e253a;
  --border:#ffffff12;--border2:#ffffff1e;--border3:#ffffff2a;
  --text:#e8eaf0;--text2:#9ba3b8;--text3:#5c6480;
  --accent:#4f7cff;--accent2:#6b93ff;--accent-bg:#4f7cff15;
  --green:#22c55e;--green-bg:#22c55e14;
  --red:#ef4444;--red-bg:#ef444414;
  --amber:#f59e0b;--amber-bg:#f59e0b14;
  --purple:#a855f7;--purple-bg:#a855f714;
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
html{overflow-anchor:none}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-anchor:none}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;width:100%}

/* Background grid */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(79,124,255,.10) 0%,transparent 70%);pointer-events:none;z-index:0}

.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* Header */
.header{width:100%;max-width:860px;padding:22px 20px 0;display:flex;align-items:center;justify-content:space-between;margin:0 auto}
.brand{display:flex;flex-direction:column}
.brand-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.timer{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--text);background:var(--bg2);border:1px solid var(--border2);padding:8px 16px;border-radius:var(--radius)}
.timer.warning{color:var(--amber);border-color:rgba(245,158,11,.3)}
.timer.danger{color:var(--red);border-color:rgba(239,68,68,.3);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.body-wrap{width:100%;max-width:860px;padding:24px 20px 60px;flex:1;display:flex;flex-direction:column;align-items:center;margin:0 auto}

/* Start screen */
.start-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:44px 40px;text-align:center;margin-top:40px}
.start-title{font-size:28px;font-weight:800;letter-spacing:-.7px;margin-bottom:10px}
.start-sub{color:var(--text2);font-size:14.5px;max-width:480px;margin:0 auto 28px}
.start-stats{display:flex;justify-content:center;gap:14px;margin-bottom:32px;flex-wrap:wrap}
.start-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 22px;min-width:120px}
.start-stat-val{font-size:22px;font-weight:700;color:var(--accent2)}
.start-stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.hint-box{background:var(--amber-bg);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:14px 18px;text-align:left;font-size:13px;color:var(--text2);margin-bottom:28px}
.hint-box b{color:var(--amber)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Onest',sans-serif;transition:all .15s;text-decoration:none;background:var(--accent);color:#fff}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border3)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-full{width:100%;justify-content:center}

/* Nav pills */
.q-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;justify-content:center;width:100%}
.q-dot{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--text3);background:var(--bg3);transition:all .15s}
.q-dot:hover{border-color:var(--accent2);color:var(--accent2)}
.q-dot.answered{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.q-dot.current{background:var(--accent);border-color:var(--accent);color:#fff}

/* Question card */
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:30px;margin-bottom:20px;text-align:center;display:flex;flex-direction:column;align-items:center;width:100%}
.q-header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.q-num{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.q-badge{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.q-badge.multi{background:var(--purple-bg);color:var(--purple)}
.q-badge.single{background:var(--accent-bg);color:var(--accent2)}
.q-body{font-size:16px;color:var(--text);line-height:1.7;margin-bottom:22px;font-weight:500;text-align:center}
.q-instruction{font-size:12.5px;color:var(--text3);margin-bottom:14px;font-style:italic;text-align:center}

.options{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;margin:0 auto}
.option{display:flex;align-items:center;gap:16px;padding:14px 18px;border-radius:var(--radius);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg3);width:min(100%,640px);text-align:left}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option.selected{border-color:var(--accent);background:var(--accent-bg)}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.incorrect{border-color:var(--red);background:var(--red-bg)}
.option.missed{border-color:var(--amber);background:var(--amber-bg)}
.option-box{width:20px;height:20px;border-radius:6px;background:var(--bg4);border:1.5px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:transparent;flex-shrink:0;transition:all .15s}
.option.selected .option-box{background:var(--accent);border-color:var(--accent);color:#fff}
.option.correct .option-box{background:var(--green);border-color:var(--green);color:#fff}
.option.incorrect .option-box{background:var(--red);border-color:var(--red);color:#fff}
.option.missed .option-box{background:var(--amber);border-color:var(--amber);color:#fff}
.option-letter{font-size:12px;font-weight:700;color:var(--text3);width:20px;flex-shrink:0;text-align:center}
.option.selected .option-letter,.option.correct .option-letter,.option.incorrect .option-letter{color:var(--text2)}
.option-text{font-size:14.5px;color:var(--text);line-height:1.5;padding-top:2px}

.nav-buttons{display:flex;justify-content:space-between;gap:12px;margin-top:8px;width:100%;max-width:640px}

/* Result */
.result-header{text-align:center;padding:44px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);margin-bottom:24px;margin-top:20px}
.result-score{font-size:68px;font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,var(--accent2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-label{font-size:15px;color:var(--text2);margin-top:6px}
.result-sub{font-size:13px;color:var(--text3);margin-top:14px}
.result-actions{display:flex;justify-content:center;gap:12px;margin-top:26px}

.review-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:14px}
.review-card.wrong{border-left:3px solid var(--red)}
.review-card.right{border-left:3px solid var(--green)}
.review-card.partial{border-left:3px solid var(--amber)}
.review-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.review-num{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.section-title{font-size:16px;font-weight:700;margin:30px 0 14px}

/* Auth + progress polish */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 16px;width:100%}
.auth-card{width:min(100%,500px);background:linear-gradient(145deg,rgba(24,29,46,.95),rgba(17,21,32,.95));border:1px solid var(--border2);border-radius:28px;padding:32px 30px;box-shadow:0 20px 80px rgba(0,0,0,.35);position:relative;overflow:hidden;backdrop-filter:blur(18px)}
.auth-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top left,rgba(111,143,255,.18),transparent 42%);pointer-events:none}
.auth-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:var(--accent-bg);color:var(--accent2);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.auth-title{font-size:30px;font-weight:800;letter-spacing:-.6px;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.auth-tabs{display:flex;gap:8px;margin-bottom:20px}
.auth-tab{flex:1;text-align:center;padding:11px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text2);font-weight:700;cursor:pointer;transition:all .2s}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 10px 24px rgba(79,124,255,.25)}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.field input{width:100%;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text);padding:13px 14px;border-radius:12px;font-size:14px;outline:none;transition:border-color .2s,background .2s}
.field input:focus{border-color:var(--accent2);background:rgba(255,255,255,.06)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 12px 24px rgba(79,124,255,.2)}
.btn-primary:hover{box-shadow:0 14px 30px rgba(79,124,255,.3)}
.auth-message{margin-top:14px;padding:10px 12px;border-radius:12px;font-size:13px;border:1px solid rgba(239,68,68,.22);background:rgba(239,68,68,.12);color:#ffd3d3}
.auth-message.success{border-color:rgba(34,197,94,.24);background:rgba(34,197,94,.12);color:#dff8e8}
.user-pill{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2)}

/* Admin panel */
.admin-tabs{display:flex;gap:8px;margin-bottom:18px}
.admin-tab{padding:10px 18px;border-radius:12px;border:1px solid var(--border2);background:rgba(255,255,255,.03);color:var(--text2);font-size:13.5px;font-weight:700;cursor:pointer;transition:all .15s}
.admin-tab:hover{border-color:var(--accent2);color:var(--text)}
.admin-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:10px 12px;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border2)}
.admin-table td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.admin-table tr:hover td{background:rgba(255,255,255,.02)}
.admin-q-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03);margin-bottom:10px}
.admin-q-text{font-size:14px;color:var(--text);flex:1;line-height:1.5}
.admin-q-actions{display:flex;gap:8px;flex-shrink:0}
.field textarea{width:100%;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text);padding:13px 14px;border-radius:12px;font-size:14px;outline:none;font-family:inherit;resize:vertical;min-height:70px;transition:border-color .2s,background .2s}
.field textarea:focus{border-color:var(--accent2);background:rgba(255,255,255,.06)}
.admin-opt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.admin-opt-row input[type=text]{flex:1;margin:0}
.admin-msg{padding:12px 16px;border-radius:12px;background:var(--accent-bg);color:var(--accent2);font-size:13px;margin-bottom:16px}
.empty-note{color:var(--text3);font-size:13px;padding:20px;text-align:center}
.user-pill strong{color:var(--text);font-size:13px}
.progress-card{width:100%;background:linear-gradient(145deg,rgba(24,29,46,.98),rgba(17,21,32,.95));border:1px solid var(--border2);border-radius:24px;padding:24px 24px 20px;box-shadow:0 18px 60px rgba(0,0,0,.28);margin-bottom:20px}
.progress-title{font-size:18px;font-weight:800;margin-bottom:6px}
.progress-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:13px 12px;min-height:88px}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:800;color:var(--accent2)}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text2);font-size:13px}
.history-item .right{color:var(--text3);font-size:12px}
.start-card{background:linear-gradient(145deg,rgba(24,29,46,.98),rgba(17,21,32,.95));border:1px solid var(--border2);border-radius:24px;padding:34px 30px;text-align:center;margin-top:8px;box-shadow:0 20px 70px rgba(0,0,0,.28)}
.start-title{font-size:28px;font-weight:800;letter-spacing:-.7px;margin-bottom:10px}
.start-sub{color:var(--text2);font-size:14.5px;max-width:560px;margin:0 auto 24px}
.start-stats{display:flex;justify-content:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.start-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:14px 18px;min-width:120px}
.start-stat-val{font-size:22px;font-weight:800;color:var(--accent2)}
.start-stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.hint-box{background:linear-gradient(90deg,rgba(245,158,11,.15),rgba(245,158,11,.06));border:1px solid rgba(245,158,11,.25);border-radius:16px;padding:14px 16px;text-align:left;font-size:13px;color:var(--text2);margin-bottom:24px}
.q-nav{margin-bottom:24px}
.q-dot{width:38px;height:38px;border-radius:12px;font-weight:800}
.question-card{background:linear-gradient(145deg,rgba(24,29,46,.98),rgba(17,21,32,.95));border:1px solid var(--border2);border-radius:24px;padding:28px;box-shadow:0 18px 60px rgba(0,0,0,.24)}
.option{padding:15px 16px;border-radius:16px}
.option:hover{transform:translateY(-1px)}
.result-header{background:linear-gradient(145deg,rgba(24,29,46,.98),rgba(17,21,32,.95));border:1px solid var(--border2);border-radius:24px;padding:34px 28px;box-shadow:0 20px 70px rgba(0,0,0,.24)}
.review-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:18px;padding:18px 18px 16px}
.review-card.right{border-left:4px solid var(--green)}
.review-card.wrong{border-left:4px solid var(--red)}
.review-card.partial{border-left:4px solid var(--amber)}

@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:600px){
  .header,.body-wrap{padding-left:14px;padding-right:14px}
  .question-card{padding:20px}
  .start-card{padding:28px 18px}
  .result-score{font-size:52px}
  .stats-grid{grid-template-columns:1fr}
  .auth-card{padding:26px 20px}
  .auth-title{font-size:26px}
  .user-pill{width:100%;justify-content:space-between}
}
</style>
</head>

// ---- Custom auth (RPC-based, no Supabase Auth/GoTrue involved at all) ----
const SESSION_KEY = 'pedagogy_session_user';
let SELECTED_QUESTIONS = [];
let authMode = 'login';
let authMessage = '';
let authBusy = false;
let currentUser = null;      // { id, username, name }
let currentProgress = {testsCompleted:0,bestScore:0,lastScore:0,history:[]};
let bootReady = false;

// ---- Admin panel state ----
let adminTab = 'results';        // 'results' | 'questions'
let adminAttempts = [];
let adminQuestions = [];
let adminLoading = false;
let adminMessage = '';
let editingQuestion = null;      // question object being edited, or {} for new

async function refreshProgress(){
  if(!currentUser) return;
  try{
    const { data, error } = await sb.rpc('get_user_progress', { p_user_id: currentUser.id });
    if(error) throw error;
    currentProgress = {
      testsCompleted: data.testsCompleted || 0,
      bestScore: Number(data.bestScore) || 0,
      lastScore: Number(data.lastScore) || 0,
      history: (data.history || []).map(a => ({
        date: new Date(a.created_at).toLocaleString('ru-RU'),
        score: a.score, maxScore: a.max_score,
        questions: a.total_questions, answered: a.answered
      }))
    };
  } catch(e){
    console.error('Не удалось загрузить прогресс:', e);
    currentProgress = {testsCompleted:0,bestScore:0,lastScore:0,history:[]};
  }
}

function saveSession(user){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch {}
}
function loadSession(){
  try{ const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); } catch {}
}

async function initSession(){
  const saved = loadSession();
  if(saved?.id){
    currentUser = saved;
    await refreshProgress();
  }
  bootReady = true;
  render();
}

function shuffle(arr){
  const copy = [...arr];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function createQuestionVariant(question){
  const order = shuffle(question.opts.map((_, idx)=>idx));
  return {
    ...question,
    opts: order.map(idx => question.opts[idx]),
    correct: question.correct.map(idx => order.indexOf(idx))
  };
}

let state = {screen:'start', current:0, answers:[], finished:false};

function letters(i){ return ['A','B','C','D','E','F','G'][i]; }

function setAnswer(qIdx, optIdx){
  let sel = state.answers[qIdx] ? [...state.answers[qIdx]] : [];
  if(sel.includes(optIdx)) sel = sel.filter(x=>x!==optIdx);
  else sel.push(optIdx);
  state.answers[qIdx] = sel;
  render();
}

function isCorrectAnswer(qIdx){
  const q = SELECTED_QUESTIONS[qIdx];
  const sel = state.answers[qIdx] || [];
  if(sel.length !== q.correct.length) return false;
  const sortedSel = [...sel].sort((a,b)=>a-b);
  const sortedCorrect = [...q.correct].sort((a,b)=>a-b);
  return sortedSel.every((v,i)=>v===sortedCorrect[i]);
}

function getQuestionScore(qIdx){
  const q = SELECTED_QUESTIONS[qIdx];
  const sel = state.answers[qIdx] || [];
  const correctSet = new Set(q.correct);
  const correctSelected = sel.filter(i => correctSet.has(i)).length;
  const wrongSelected = sel.filter(i => !correctSet.has(i)).length;
  const totalCorrect = q.correct.length;
  if(totalCorrect === 0) return 0;

  // Все правильные и ни одного лишнего — максимум
  if(correctSelected === totalCorrect && wrongSelected === 0) return 2;

  // Слишком много неправильных вариантов — 0 баллов
  if(wrongSelected >= 2 || wrongSelected > correctSelected) return 0;

  // Часть правильных без ошибок ИЛИ все правильные с одной лишней ошибкой — 1 балл
  if((correctSelected > 0 && correctSelected < totalCorrect && wrongSelected === 0) ||
     (correctSelected === totalCorrect && wrongSelected === 1)){
    return 1;
  }

  return 0;
}

function computeScore(){
  let score = 0;
  SELECTED_QUESTIONS.forEach((q,i)=>{ score += getQuestionScore(i); });
  return score;
}

function goStart(){
  SELECTED_QUESTIONS = [];
  state = {screen:'start', current:0, answers:[], finished:false};
  render();
}
function goTest(){
  SELECTED_QUESTIONS = shuffle(QUESTIONS).slice(0, 20).map(createQuestionVariant);
  state = {screen:'test', current:0, answers:Array(SELECTED_QUESTIONS.length).fill(null), finished:false};
  render();
}
function goTo(i){ state.current=i; render(); }
function goNext(){ if(state.current < SELECTED_QUESTIONS.length-1){ state.current++; render(); } }
function goPrev(){ if(state.current > 0){ state.current--; render(); } }
async function saveTestResult(){
  if(!currentUser) return;
  const score = Number(computeScore().toFixed(1));
  const maxScore = SELECTED_QUESTIONS.length * 2;
  const answered = state.answers.filter(a=>a && a.length>0).length;
  const results = SELECTED_QUESTIONS.map((q,i)=>({
    question: q.q, selected: state.answers[i] || [], correct: q.correct, score: getQuestionScore(i)
  }));
  try{
    const { error } = await sb.rpc('save_attempt', {
      p_user_id: currentUser.id,
      p_score: score,
      p_max_score: maxScore,
      p_total_questions: SELECTED_QUESTIONS.length,
      p_answered: answered,
      p_results: results
    });
    if(error) throw error;
  } catch(e){
    console.error('Не удалось сохранить попытку в Supabase:', e);
  }
  await refreshProgress();
}
async function finishTest(){
  state.finished=true; state.screen='result'; render();
  await saveTestResult();
  render();
}

function switchAuthMode(mode){ authMode = mode; authMessage=''; render(); }

// Тек логин мен құпия сөз. Supabase Auth (GoTrue) мүлдем қолданылмайды —
// логин де, кіру де тікелей серверлік RPC функциялары арқылы жүреді
// (register_username / login_username), сондықтан GoTrue-дың "signups
// disabled" немесе "logins disabled" деген жоба баптаулары бұған
// мүлдем әсер етпейді. Сессия жай ғана localStorage-те сақталады.
function normalizeLogin(raw){
  return (raw||'').trim().toLowerCase();
}
function isValidLogin(login){
  return /^[a-z0-9_.-]{3,32}$/.test(login);
}

async function submitAuth(e){
  e.preventDefault();
  if(authBusy) return;
  const login = normalizeLogin(document.getElementById('authUsername').value);
  const password = document.getElementById('authPassword').value;
  const name = document.getElementById('authName')?.value.trim() || '';
  if(!login || !password){ authMessage='Логин мен құпия сөзді енгізіңіз'; render(); return; }
  if(!isValidLogin(login)){ authMessage='Логин тек латын әріптері, сандар, "_", "-", "." таңбаларынан тұруы керек (3-32 таңба)'; render(); return; }
  if(authMode==='register' && password.length < 6){ authMessage='Құпия сөз кемінде 6 таңбадан тұруы керек'; render(); return; }

  authBusy = true; authMessage=''; render();
  try{
    if(authMode==='login'){
      const { data, error } = await sb.rpc('login_username', { p_username: login, p_password: password });
      if(error) throw error;
      currentUser = { id: data.id, username: data.username, name: data.name || data.username, isAdmin: !!data.isAdmin };
      saveSession(currentUser);
      await refreshProgress();
    } else {
      const { error: regError } = await sb.rpc('register_username', { p_username: login, p_password: password, p_name: name || login });
      if(regError) throw regError;
      const { data, error } = await sb.rpc('login_username', { p_username: login, p_password: password });
      if(error) throw error;
      currentUser = { id: data.id, username: data.username, name: data.name || data.username, isAdmin: !!data.isAdmin };
      saveSession(currentUser);
      await refreshProgress();
    }
  } catch(err){
    const rawMsg = err?.message || '';
    if(rawMsg.includes('бұрыннан бар')) authMessage = 'Бұл логин бойынша аккаунт бұрыннан бар';
    else if(rawMsg.includes('қате')) authMessage = 'Логин немесе құпия сөз қате';
    else authMessage = rawMsg || 'Қате шықты, қайталап көріңіз';
  }
  authBusy = false;
  render();
}
function logout(){
  currentUser = null;
  currentProgress = {testsCompleted:0,bestScore:0,lastScore:0,history:[]};
  clearSession();
  authMessage=''; render();
}

async function loadAdminData(){
  if(!currentUser?.isAdmin) return;
  adminLoading = true; render();
  try{
    const [{ data: attempts, error: e1 }, { data: questions, error: e2 }] = await Promise.all([
      sb.rpc('admin_get_all_attempts', { p_admin_id: currentUser.id }),
      sb.rpc('admin_get_all_questions', { p_admin_id: currentUser.id })
    ]);
    if(e1) throw e1;
    if(e2) throw e2;
    adminAttempts = attempts || [];
    adminQuestions = questions || [];
  } catch(e){
    adminMessage = 'Деректерді жүктеу кезінде қате: ' + (e?.message || '');

function startNewQuestion(){
  editingQuestion = { id: null, question: '', opts: ['', ''], correct: [0] };
  render();
}
function startEditQuestion(id){
  const q = adminQuestions.find(x=>x.id===id);
  if(!q) return;
  editingQuestion = { id: q.id, question: q.question, opts: [...q.options], correct: [...q.correct] };
  render();
}
function cancelEditQuestion(){
  editingQuestion = null;
  render();
}
function editQAddOption(){
  if(!editingQuestion) return;
  editingQuestion.opts.push('');
  render();
}
function editQRemoveOption(idx){
  if(!editingQuestion || editingQuestion.opts.length <= 2) return;
  editingQuestion.opts.splice(idx, 1);
  editingQuestion.correct = editingQuestion.correct.filter(c=>c!==idx).map(c=>c>idx?c-1:c);
  render();
}
function editQUpdateOptionText(idx, val){
  if(!editingQuestion) return;
  editingQuestion.opts[idx] = val;
}
function editQUpdateQuestionText(val){
  if(!editingQuestion) return;
  editingQuestion.question = val;
}
function editQToggleCorrect(idx){
  if(!editingQuestion) return;
  const c = editingQuestion.correct;
  if(c.includes(idx)) editingQuestion.correct = c.filter(x=>x!==idx);
  else editingQuestion.correct = [...c, idx];
  render();
}
async function saveEditingQuestion(){
  if(!editingQuestion || !currentUser?.isAdmin) return;
  // pull latest textarea/input values from DOM before saving (controlled-less inputs)
  const qText = document.getElementById('adminQText')?.value.trim() || '';
  const optInputs = document.querySelectorAll('.admin-opt-input');
  const opts = Array.from(optInputs).map(i=>i.value.trim());
  editingQuestion.question = qText;
  editingQuestion.opts = opts;

  if(!qText){ adminMessage = 'Сұрақ мәтінін енгізіңіз'; render(); return; }
  if(opts.some(o=>!o)){ adminMessage = 'Барлық жауап өрістерін толтырыңыз'; render(); return; }
  if(editingQuestion.correct.length < 1){ adminMessage = 'Кемінде бір дұрыс жауапты белгілеңіз'; render(); return; }

  adminLoading = true; render();
  try{
    const { error } = await sb.rpc('admin_upsert_question', {
      p_admin_id: currentUser.id,
      p_id: editingQuestion.id,
      p_question: qText,
      p_options: opts,
      p_correct: editingQuestion.correct
    });
    if(error) throw error;
    editingQuestion = null;
    adminMessage = 'Сұрақ сәтті сақталды';
    await loadAdminData();
  } catch(e){
    adminMessage = 'Қате: ' + (e?.message || '');
    adminLoading = false; render();
  }
}
async function deleteQuestionAdmin(id){
  if(!currentUser?.isAdmin) return;
  if(!confirm('Бұл сұрақты өшіргіңіз келе ме?')) return;
  adminLoading = true; render();
  try{
    const { error } = await sb.rpc('admin_delete_question', { p_admin_id: currentUser.id, p_id: id });
    if(error) throw error;
    await loadAdminData();
  } catch(e){
    adminMessage = 'Қате: ' + (e?.message || '');
    adminLoading = false; render();
  }
}

function renderResult(){

    const qScore = getQuestionScore(i);
    let opts = '';
    q.opts.forEach((o,idx)=>{
      const wasSel = sel.includes(idx);
      const isCorrectOpt = q.correct.includes(idx);
      let cls = '';
      if(isCorrectOpt && wasSel) cls = 'correct';
      else if(isCorrectOpt && !wasSel) cls = 'missed';
      else if(!isCorrectOpt && wasSel) cls = 'incorrect';
      opts += `
      <div class="option ${cls}">
        <div class="option-letter">${letters(idx)}</div>
        <div class="option-box">${wasSel?'✓':''}</div>
        <div class="option-text">${o}</div>

    review += `

  return `

  </div>

  </div>
  <div class="body-wrap">
    <div class="admin-tabs">
      <div class="admin-tab ${adminTab==='results'?'active':''}" onclick="switchAdminTab('results')">Нәтижелер</div>
      <div class="admin-tab ${adminTab==='questions'?'active':''}" onclick="switchAdminTab('questions')">Сұрақтар</div>
    </div>
    ${adminMessage?`<div class="admin-msg">${adminMessage}</div>`:''}
    <div class="progress-card">
      ${adminLoading && !editingQuestion ? `<div class="empty-note">Жүктелуде…</div>` : (adminTab==='results' ? renderAdminResultsTab() : renderAdminQuestionsTab())}
    </div>
  </div>`;
}

function renderLoading(){
  return `<div class="auth-screen"><div class="auth-card" style="text-align:center">
    <div class="auth-title" style="font-size:20px">Жүктелуде…</div>
    <div class="auth-sub">Supabase-пен байланыс орнатылуда</div>
  </div></div>`;
}

function render(){
  const app = document.getElementById('app');
  if(!bootReady){ app.innerHTML = renderLoading(); return; }
  if(!currentUser){ app.innerHTML = renderAuth(); }
  else if(state.screen==='admin' && currentUser.isAdmin) app.innerHTML = renderAdmin();
  else if(state.screen==='start') app.innerHTML = renderStart();
  else if(state.screen==='test') app.innerHTML = renderTest();
  else app.innerHTML = renderResult();
}

render();
initSession();
</script>
</body>
</html>
