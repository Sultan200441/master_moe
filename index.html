<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Педагогика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0a0d14;
    font-family:'Onest',sans-serif;
    overflow:hidden;
  }
  .bg-glow{
    position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 40% at 50% 50%, rgba(79,124,255,.12) 0%, transparent 70%);
    pointer-events:none;
  }
  .msg{
    position:relative;
    z-index:1;
    color:#e8eaf0;
    font-size:22px;
    font-weight:600;
    letter-spacing:-.2px;
    text-align:center;
    padding:0 24px;
    animation:fade 1.2s ease;
  }
  @keyframes fade{
    from{opacity:0;transform:translateY(6px)}
    to{opacity:1;transform:translateY(0)}
  }
  @media(max-width:480px){
    .msg{font-size:18px}
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="msg">Сайтта сұрақтар жөңделуде 🙂</div>
</body>
</html>
